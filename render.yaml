databases:
  - name: rrv-furniture-db
    databaseName: rrv_furniture
    user: rrv_furniture
    plan: free

services:
  - type: web
    name: rrv-furniture-aluminum-workers
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input"
    preDeployCommand: "python manage.py migrate && python manage.py setup_rrv_admin"
    startCommand: "gunicorn aluminum_furniture_erp.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rrv-furniture-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: RRV_ADMIN_USERNAME
        value: "rajesh"
      - key: RRV_ADMIN_EMAIL
        sync: false
      - key: RRV_ADMIN_PASSWORD
        sync: false
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
    disk:
      name: media
      mountPath: /opt/render/project/src/media
      sizeGB: 1
