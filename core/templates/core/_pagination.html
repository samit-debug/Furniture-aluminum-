{% if is_paginated %}
<nav class="pagination-row" aria-label="Pagination">
    {% if page_obj.has_previous %}
        <a class="btn btn-outline-secondary btn-sm" href="?page={{ page_obj.previous_page_number }}{% if query %}&q={{ query }}{% endif %}">Previous</a>
    {% endif %}
    <span>Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
        <a class="btn btn-outline-secondary btn-sm" href="?page={{ page_obj.next_page_number }}{% if query %}&q={{ query }}{% endif %}">Next</a>
    {% endif %}
</nav>
{% endif %}
